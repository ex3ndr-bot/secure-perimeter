apiVersion: apps/v1
kind: Deployment
metadata:
  name: kbs
  namespace: trustee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kbs
  template:
    metadata:
      labels:
        app: kbs
    spec:
      containers:
        - name: kbs
          image: ghcr.io/confidential-containers/staged-images/kbs:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/kbs
            - name: reference-values
              mountPath: /etc/kbs/reference-values
      volumes:
        - name: config
          configMap:
            name: kbs-config
        - name: reference-values
          configMap:
            name: kbs-reference-values
---
apiVersion: v1
kind: Service
metadata:
  name: kbs
  namespace: trustee
spec:
  selector:
    app: kbs
  ports:
    - port: 8080
      targetPort: 8080
